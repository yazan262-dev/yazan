<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ملتقى شباب التميز إربد</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;font-family:'Cairo',sans-serif;transition:all 0.2s}
body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(-45deg,#0d47a1,#1976d2,#42a5f5,#90caf9);
  background-size:400% 400%;
  animation:gradientMove 15s ease infinite;
  display:flex;
  justify-content:center;
  padding:15px;
}
@keyframes gradientMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
.container{
  width:100%;
  max-width:1100px;
  background:white;
  border-radius:25px;
  padding:25px;
  box-shadow:0 20px 50px rgba(0,0,0,0.2);
}
.header{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:15px;
  margin-bottom:15px;
}
.logo{
  width:70px;
  height:70px;
  object-fit:contain;
  animation:logoFloat 3s ease-in-out infinite;
}
@keyframes logoFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}
h1{color:#0d47a1;margin:0;font-size:26px;animation:fadeIn 1.2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}

/* إحصائيات ونقاط */
.stats{text-align:center;margin-bottom:20px}
.points{font-size:22px;font-weight:bold}
.progress{
  height:18px;
  background:#e3f2fd;
  border-radius:20px;
  overflow:hidden;
  margin:10px 0;
}
.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#0d47a1,#1976d2,#42a5f5);
  transition:0.4s;
}
button{
  padding:5px 8px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  background:linear-gradient(45deg,#0d47a1,#1976d2);
  color:white;
  transition:0.3s;
  font-size:12px;
}
button:hover{transform:scale(1.05);}
.reset-btn{margin-top:10px;background:linear-gradient(45deg,#1565c0,#42a5f5);}
.reset-btn:active{transform:scale(0.9);}

.input-section{display:flex;gap:5px;margin-bottom:15px;flex-wrap:wrap;align-items:center;}
.input-section input{
  padding:5px;
  border-radius:12px;
  border:1px solid #1976d2;
  background:#e1f5fe;
  color:#0d47a1;
  flex:1 1 auto;
  min-width:70px;
  max-width:180px;
  font-size:12px;
}
.input-section button{flex:0 0 auto; font-size:12px;}

.table-container{
  overflow-x:auto;
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
  min-width:480px; /* أصغر عرض ممكن يظهر كل أيام الأسبوع */
}
th,td{
  padding:2px;
  text-align:center;
  font-size:10px;
}
th{background:#0d47a1;color:white}
tr:hover{background:#e3f2fd}
input[type="checkbox"]{width:14px;height:14px;accent-color:#0d47a1}
.delete-btn{
  background:#1976d2;
  color:white;
  border:none;
  padding:2px 4px;
  border-radius:6px;
  cursor:pointer;
  font-size:9px;
}
.delete-btn:hover{background:#42a5f5;}

.top-board{
  margin-top:15px;
  background:#e3f2fd;
  padding:6px 10px;
  border-radius:10px;
}
.top-board ul{list-style:none;padding:0;margin:0;font-size:12px;}

.notification{
  position:fixed;
  top:15px;
  right:15px;
  background:#0d47a1;
  color:white;
  padding:8px 12px;
  border-radius:10px;
  opacity:0;
  transform:scale(0.5);
  z-index:1000;
}
.notification.show{
  animation:pop 0.6s forwards;
}
@keyframes pop{
  0%{opacity:0;transform:scale(0.5)}
  60%{opacity:1;transform:scale(1.1)}
  100%{opacity:1;transform:scale(1)}
}

/* Responsive */
@media(max-width:768px){
  .header h1{font-size:20px;}
  .logo{width:50px;height:50px;}
  .input-section input{max-width:140px;}
  table, th, td{font-size:9px; padding:1px;}
  .delete-btn{padding:1px 3px; font-size:8px;}
}

@media(max-width:480px){
  .header h1{font-size:18px;}
  .logo{width:40px;height:40px;}
  .input-section input{max-width:100px;}
  table, th, td{font-size:8px; padding:1px;}
  .delete-btn{padding:1px 2px; font-size:7px;}
  table{min-width:420px;} /* أصغر جدول ممكن يظهر كل أيام الأسبوع على الجوال */
}
</style>
</head>
<body>
<div class="container">

<div class="header">
  <img src="https://i.imgur.com/UUCXAqE.png" alt="شعار ملتقى شباب التميز" class="logo">
  <h1>ملتقى شباب التميز إربد</h1>
</div>

<div class="input-section">
  <span id="displayName" style="font-weight:bold;font-size:14px;animation:fadeIn 1s;">
    اسمك: <span id="currentName">ضيف هنا</span>
  </span>
  <input type="text" id="nameInput" placeholder="غيّر اسمك...">
  <button onclick="changeName()">تغيير الاسم</button>
</div>

<div class="stats">
  <div class="points" id="points">النقاط: 0</div>
  <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
  <div id="level">المستوى: مبتدئ</div>
  <button class="reset-btn" onclick="resetPoints()">🔄 تصفير النقاط</button>
</div>

<div class="input-section">
  <input type="text" id="habitInput" placeholder="أضف عادة جديدة...">
  <button onclick="addHabit()">إضافة</button>
</div>

<div class="table-container">
<table id="habitTable">
<thead>
<tr>
<th>العادة</th>
<th>الأحد</th><th>الإثنين</th><th>الثلاثاء</th>
<th>الأربعاء</th><th>الخميس</th><th>الجمعة</th><th>السبت</th>
<th>حذف</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="top-board">
<h3>🏆 أعلى نتيجة</h3>
<ul id="topList"></ul>
</div>

<div id="notification" class="notification"></div>
</div>

<script>
let points = 0;
let bestScore = parseInt(localStorage.getItem("bestScore")) || 0;
const tableBody = document.querySelector("#habitTable tbody");

function showNotification(msg){
  const notif = document.getElementById("notification");
  notif.textContent = msg;
  notif.classList.remove("show");
  void notif.offsetWidth;
  notif.classList.add("show");
  setTimeout(()=>notif.classList.remove("show"),2000);
}

function saveHabits(){
  const habits=[];
  tableBody.querySelectorAll("tr").forEach(row=>{
    const name=row.cells[0].textContent;
    const days=[];
    for(let i=1;i<=7;i++){days.push(row.cells[i].querySelector("input").checked);}
    habits.push({name,days});
  });
  localStorage.setItem("habits",JSON.stringify(habits));
}

function loadHabits(){
  const habits=JSON.parse(localStorage.getItem("habits"))||[];
  tableBody.innerHTML="";
  habits.forEach(h=>tableBody.appendChild(createHabitRow(h.name,h.days)));
  calculatePoints();
}

function createHabitRow(name,days=[]){
  const row=document.createElement("tr");
  row.innerHTML=`<td>${name}</td>`;
  for(let i=0;i<7;i++){
    const td=document.createElement("td");
    const cb=document.createElement("input");
    cb.type="checkbox";
    cb.checked=days[i]||false;
    cb.addEventListener("change",()=>{
      calculatePoints();
      saveHabits();
    });
    td.appendChild(cb);
    row.appendChild(td);
  }
  const del=document.createElement("td");
  del.innerHTML="<button class='delete-btn'>X</button>";
  del.addEventListener("click",()=>{
    row.remove();
    calculatePoints(); 
    saveHabits();
    showNotification("🗑 تم حذف عادة");
  });
  row.appendChild(del);
  return row;
}

function addHabit(){
  const input=document.getElementById("habitInput");
  if(!input.value.trim()) return;
  const row=createHabitRow(input.value);
  tableBody.appendChild(row);
  input.value="";
  saveHabits();
  calculatePoints();
  showNotification("✅ عادة جديدة أضيفت");
}

function calculatePoints(){
  points=0;
  tableBody.querySelectorAll("tr").forEach(row=>{
    for(let i=1;i<=7;i++){
      if(row.cells[i].querySelector("input").checked) points+=10;
    }
  });
  updateStats();
}

function updateStats(){
  document.getElementById("points").textContent="النقاط: "+points;
  document.getElementById("progressBar").style.width=(points%100)+"%";
  let level="مبتدئ";
  if(points>=200) level="أسطورة 👑";
  else if(points>=100) level="متقدم 🔥";
  document.getElementById("level").textContent="المستوى: "+level;
  if(points>bestScore){
    bestScore=points;
    localStorage.setItem("bestScore",bestScore);
    showNotification("🏆 رقم قياسي جديد!");
  }
  updateTopList();
}

function updateTopList(){
  const list=document.getElementById("topList");
  list.innerHTML=`<li>🥇 النقاط الحالية: ${points} نقطة</li>`;
}

function resetPoints(){
  document.querySelectorAll("input[type='checkbox']").forEach(cb=>cb.checked=false);
  points=0;
  updateStats();
  saveHabits();
  showNotification("🔄 تم تصفير النقاط");
}

function changeName(){
  const input=document.getElementById("nameInput");
  const newName=input.value.trim();
  if(!newName) return;
  const nameDisplay=document.getElementById("currentName");
  nameDisplay.style.transition="all 0.5s";
  nameDisplay.style.transform="scale(1.3)";
  nameDisplay.style.color="#ff5722";
  setTimeout(()=>{
    nameDisplay.textContent=newName;
    nameDisplay.style.transform="scale(1)";
    nameDisplay.style.color="#0d47a1";
  },300);
  localStorage.setItem("userName", newName);
  input.value="";
  showNotification("✨ تم تغيير الاسم بنجاح!");
}

window.addEventListener("DOMContentLoaded",()=>{
  const savedName = localStorage.getItem("userName");
  if(savedName){
    document.getElementById("currentName").textContent = savedName;
  }
  loadHabits();
});
</script>
</body>
</html>
