<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ملتقى شباب التميز إربد</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;font-family:'Cairo',sans-serif;transition:all 0.2s}
body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(-45deg,#0d95e8,#42b1f5,#e3f2fd,#ffffff);
  background-size:400% 400%;
  animation:gradientMove 15s ease infinite;
  display:flex;
  justify-content:center;
  padding:15px;
  color:#0d1b2a;
}
@keyframes gradientMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
.container{
  width:100%;
  max-width:1100px;
  background:rgba(255,255,255,0.9);
  border-radius:25px;
  padding:25px;
  box-shadow:0 20px 50px rgba(0,0,0,0.2);
  animation:fadeIn 1s ease;
  position:relative;
}
@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
h1{text-align:center;color:#0d95e8;margin-bottom:15px;font-size:28px;}
h1 img{
  width:30px; height:30px; vertical-align:middle; margin-left:8px;
  background-color:transparent; object-fit:contain;
}
.stats{text-align:center;margin-bottom:20px}
.points{font-size:22px;font-weight:bold;display:inline-block;}
.points.animate{animation:pulse 0.4s}
@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.3);color:#0d95e8;text-shadow:0 0 10px #42b1f5}
  100%{transform:scale(1)}
}
.progress{
  height:18px;
  background:#e3f2fd;
  border-radius:20px;
  overflow:hidden;
  margin:10px 0;
}
.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#0d95e8,#ffffff);
  transition:0.4s;
  border-radius:20px;
}
.input-section{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap}
input,button{padding:10px;border-radius:12px;border:1px solid #90caf9;outline:none}
button{
  cursor:pointer;
  font-weight:bold;
  background:linear-gradient(45deg,#0d95e8,#42b1f5);
  color:white;
  transition:0.2s
}
button:hover{transform:scale(1.05);box-shadow:0 0 15px #0d95e8}
.table-container{
  overflow-x:auto;
}
table{width:100%;border-collapse:collapse;margin-top:10px;font-size:14px;min-width:700px;}
th,td{padding:8px;text-align:center;white-space:nowrap;}
th{background:#0d95e8;color:white}
tr:hover{background:#e3f2fd;transition:0.3s}
input[type="checkbox"]{width:18px;height:18px;accent-color:#0d95e8;cursor:pointer}
.delete-btn{background:#0d95e8;color:white}
.delete-btn:hover{transform:scale(1.1)}
.top-board{margin-top:25px;background:#e3f2fd;padding:15px;border-radius:15px}
.top-board ul{list-style:none;padding:0;margin:0}
.top-board li{padding:5px 0;border-bottom:1px solid #bbdefb}
.change-name-btn{background:#0d95e8;color:white;cursor:pointer;}
.notification{
  position:absolute;
  top:15px;
  right:15px;
  background:#0d95e8;
  color:white;
  padding:10px 15px;
  border-radius:12px;
  opacity:0;
  pointer-events:none;
  transform:translateY(-20px);
  animation-fill-mode:forwards;
}
.notification.show{
  animation:slideFadeIn 0.5s forwards,slideFadeOut 0.5s 2.5s forwards;
}
@keyframes slideFadeIn{
  from{opacity:0;transform:translateY(-20px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes slideFadeOut{
  from{opacity:1;transform:translateY(0)}
  to{opacity:0;transform:translateY(-20px)}
}
/* نافذة تغيير الاسم */
#nameModal{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.4);
  display:flex;justify-content:center;align-items:center;
  visibility:hidden;opacity:0;
  transition:opacity 0.3s;
  z-index:999;
}
#nameModal.show{visibility:visible;opacity:1;}
#nameModalContent{
  background:linear-gradient(-45deg,#0d95e8,#ffffff);
  background-size:400% 400%;
  animation:modalGradient 5s ease infinite;
  padding:25px 30px;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,0.3);
  display:flex;flex-direction:column;align-items:center;
}
#nameModalContent input{
  padding:10px 12px;border-radius:10px;border:1px solid #90caf9;margin-bottom:15px;width:250px;
}
#nameModalContent button{
  padding:10px 15px;border-radius:12px;border:none;background:#0d95e8;color:white;font-weight:bold;
  cursor:pointer;
}
@keyframes modalGradient{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* Responsive */
@media (max-width:768px){
  h1{font-size:24px;}
  .input-section{flex-direction:column;}
}
</style>
</head>

<body>
<div class="container">

<h1><img src="https://i.imgur.com/zt5NNlK.png" alt="شعار"> ملتقى شباب التميز إربد</h1>

<div class="stats">
  <div id="playerName">👤 اللاعب: </div>
  <div class="points" id="points">النقاط: 0</div>
  <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
  <div id="level">المستوى: مبتدئ</div>
  <button class="change-name-btn" onclick="openNameModal()">تغيير الاسم</button>
</div>

<div class="input-section">
  <input type="text" id="habitInput" placeholder="أضف عادة جديدة...">
  <button onclick="addHabit()">إضافة</button>
</div>

<div class="table-container">
<table id="habitTable">
<thead>
<tr>
<th>العادة</th>
<th>الأحد</th>
<th>الإثنين</th>
<th>الثلاثاء</th>
<th>الأربعاء</th>
<th>الخميس</th>
<th>الجمعة</th>
<th>السبت</th>
<th>حذف</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="top-board">
<h3>🏆 أعلى نتيجة</h3>
<ul id="topList"></ul>
</div>

<div id="notification" class="notification"></div>

<!-- نافذة تغيير الاسم -->
<div id="nameModal">
  <div id="nameModalContent">
    <h3>✏ تغيير الاسم</h3>
    <input type="text" id="newNameInput" placeholder="أدخل اسم جديد">
    <button onclick="saveNewName()">حفظ</button>
  </div>
</div>

</div>

<script>
let points = 0;
let player = localStorage.getItem("playerName");
let bestScore = parseInt(localStorage.getItem("bestScore")) || 0;

if(!player){
  player = "لاعب مجهول";
  localStorage.setItem("playerName",player);
}
document.getElementById("playerName").textContent = "👤 اللاعب: "+player;

const tableBody = document.querySelector("#habitTable tbody");
const notif = document.getElementById("notification");
const nameModal = document.getElementById("nameModal");
const newNameInput = document.getElementById("newNameInput");

function showNotification(msg){
  notif.textContent = msg;
  notif.classList.add("show");
  setTimeout(()=>{ notif.classList.remove("show"); },3000);
}

function updateStats(action){
  const pointsEl=document.getElementById("points");
  pointsEl.textContent="النقاط: "+points;
  pointsEl.classList.add("animate");
  setTimeout(()=>pointsEl.classList.remove("animate"),400);

  let level="مبتدئ";
  if(points>=200) level="أسطورة 👑";
  else if(points>=100) level="متقدم 🔥";
  document.getElementById("level").textContent="المستوى: "+level;

  document.getElementById("progressBar").style.width=(points%100)+"%";

  if(points > bestScore){
    bestScore = points;
    localStorage.setItem("bestScore",bestScore);
    showNotification("🏆 رقم قياسي جديد!");
  } else if(action){
    showNotification(action);
  }

  localStorage.setItem("pointsData",points);
  updateTop();
}

function addHabit(){
  const input=document.getElementById("habitInput");
  if(input.value.trim()==="") return;
  const row=document.createElement("tr");
  let habitCell=document.createElement("td");
  habitCell.textContent=input.value;
  row.appendChild(habitCell);
  for(let i=0;i<7;i++){
    let cell=document.createElement("td");
    let checkbox=document.createElement("input");
    checkbox.type="checkbox";
    checkbox.addEventListener("change",function(){
      points += this.checked?10:-10;
      if(points<0) points=0;
      updateStats(this.checked?"✔ تمت زيادة 10 نقاط":"❌ نقص 10 نقاط");
    });
    cell.appendChild(checkbox);
    row.appendChild(cell);
  }
  let deleteCell=document.createElement("td");
  deleteCell.innerHTML="<button class='delete-btn' onclick='deleteHabit(this)'>X</button>";
  row.appendChild(deleteCell);
  tableBody.appendChild(row);
  input.value="";
  showNotification("✅ عادة جديدة أضيفت");
}

function deleteHabit(btn){
  btn.closest("tr").remove();
  showNotification("🗑 تم حذف عادة");
}

function updateTop(){
  const list=document.getElementById("topList");
  list.innerHTML="";
  let li=document.createElement("li");
  li.textContent="🥇 "+player+" - "+bestScore+" نقطة";
  list.appendChild(li);
}

function openNameModal(){
  newNameInput.value = player;
  nameModal.classList.add("show");
}

function saveNewName(){
  let newName = newNameInput.value.trim();
  if(newName!==""){
    player = newName;
    localStorage.setItem("playerName",player);
    document.getElementById("playerName").textContent = "👤 اللاعب: "+player;
    showNotification("✏ تم تغيير الاسم إلى "+player);
    updateTop();
  }
  nameModal.classList.remove("show");
}

function loadData(){
  const savedPoints=localStorage.getItem("pointsData");
  if(savedPoints) points=parseInt(savedPoints);
  updateStats();
}

loadData();
</script>

</body>
</html>
