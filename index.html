<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ملتقى شباب التميز إربد</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;font-family:'Cairo',sans-serif;transition:all 0.2s}
body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(-45deg,#0d95e8,#42b1f5,#e3f2fd,#ffffff);
  background-size:400% 400%;
  animation:gradientMove 15s ease infinite;
  display:flex;
  justify-content:center;
  padding:15px;
  color:#0d1b2a;
}
@keyframes gradientMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
.container{
  width:100%;
  max-width:1100px;
  background:rgba(255,255,255,0.95);
  border-radius:25px;
  padding:25px;
  box-shadow:0 20px 50px rgba(0,0,0,0.2);
}
h1{text-align:center;color:#0d95e8;margin-bottom:15px;font-size:28px;}
.stats{text-align:center;margin-bottom:20px}
.points{font-size:22px;font-weight:bold;display:inline-block;}
.progress{
  height:18px;
  background:#e3f2fd;
  border-radius:20px;
  overflow:hidden;
  margin:10px 0;
}
.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#0d95e8,#ffffff);
  transition:0.4s;
  border-radius:20px;
}
.input-section{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap}
input,button{padding:10px;border-radius:12px;border:1px solid #90caf9;outline:none}
button{
  cursor:pointer;
  font-weight:bold;
  background:linear-gradient(45deg,#0d95e8,#42b1f5);
  color:white;
}
.table-container{overflow-x:auto;}
table{width:100%;border-collapse:collapse;margin-top:10px;font-size:14px;min-width:700px;}
th,td{padding:8px;text-align:center;white-space:nowrap;}
th{background:#0d95e8;color:white}
tr:hover{background:#e3f2fd;}
input[type="checkbox"]{width:18px;height:18px;accent-color:#0d95e8;cursor:pointer}
.delete-btn{background:#0d95e8;color:white;border:none;padding:5px 10px;border-radius:8px;cursor:pointer}
.top-board{margin-top:25px;background:#e3f2fd;padding:15px;border-radius:15px}
.top-board ul{list-style:none;padding:0;margin:0}
.top-board li{padding:5px 0;border-bottom:1px solid #bbdefb}
.notification{
  position:absolute;
  top:15px;
  right:15px;
  background:#0d95e8;
  color:white;
  padding:10px 15px;
  border-radius:12px;
  opacity:0;
  pointer-events:none;
  transform:translateY(-20px);
  transition:0.3s;
}
.notification.show{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>
<div class="container">

<h1>ملتقى شباب التميز إربد</h1>

<div class="stats">
  <div id="playerName"></div>
  <div class="points" id="points">النقاط: 0</div>
  <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
  <div id="level">المستوى: مبتدئ</div>
</div>

<div class="input-section">
  <input type="text" id="habitInput" placeholder="أضف عادة جديدة...">
  <button onclick="addHabit()">إضافة</button>
</div>

<div class="table-container">
<table id="habitTable">
<thead>
<tr>
<th>العادة</th>
<th>الأحد</th>
<th>الإثنين</th>
<th>الثلاثاء</th>
<th>الأربعاء</th>
<th>الخميس</th>
<th>الجمعة</th>
<th>السبت</th>
<th>حذف</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="top-board">
<h3>🏆 أعلى نتيجة</h3>
<ul id="topList"></ul>
</div>

<div id="notification" class="notification"></div>

</div>

<script>
let points = 0;
let player = localStorage.getItem("playerName") || "لاعب مجهول";
let bestScore = parseInt(localStorage.getItem("bestScore")) || 0;

const tableBody = document.querySelector("#habitTable tbody");
const notif = document.getElementById("notification");

document.getElementById("playerName").textContent = "👤 اللاعب: "+player;

function showNotification(msg){
  notif.textContent = msg;
  notif.classList.add("show");
  setTimeout(()=>{ notif.classList.remove("show"); },3000);
}

function calculatePointsFromHabits(){
  points = 0;
  const rows = tableBody.querySelectorAll("tr");

  rows.forEach(row=>{
    for(let i=1;i<=7;i++){
      if(row.cells[i].querySelector("input").checked){
        points += 10;
      }
    }
  });
}

function updateStats(action){
  document.getElementById("points").textContent="النقاط: "+points;

  let level="مبتدئ";
  if(points>=200) level="أسطورة 👑";
  else if(points>=100) level="متقدم 🔥";
  document.getElementById("level").textContent="المستوى: "+level;

  document.getElementById("progressBar").style.width=(points%100)+"%";

  if(points > bestScore){
    bestScore = points;
    localStorage.setItem("bestScore",bestScore);
    showNotification("🏆 رقم قياسي جديد!");
  } else if(action){
    showNotification(action);
  }

  updateTop();
}

function createHabitRow(name, days=[]){
  const row = document.createElement("tr");
  const habitCell = document.createElement("td");
  habitCell.textContent = name;
  row.appendChild(habitCell);

  for(let i=0;i<7;i++){
    const cell = document.createElement("td");
    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.checked = days[i] || false;

    checkbox.addEventListener("change", function(){
      calculatePointsFromHabits();
      updateStats(this.checked?"✔ تمت زيادة 10 نقاط":"❌ نقص 10 نقاط");
      saveHabits();
    });

    cell.appendChild(checkbox);
    row.appendChild(cell);
  }

  const deleteCell = document.createElement("td");
  deleteCell.innerHTML = "<button class='delete-btn'>X</button>";
  deleteCell.querySelector(".delete-btn").addEventListener("click", ()=>{
    row.remove();
    calculatePointsFromHabits();
    updateStats("🗑 تم حذف عادة");
    saveHabits();
  });
  row.appendChild(deleteCell);

  return row;
}

function saveHabits(){
  const rows = tableBody.querySelectorAll("tr");
  const habitsArray = [];
  rows.forEach(row=>{
    const name = row.cells[0].textContent;
    const days = [];
    for(let i=1;i<=7;i++){
      days.push(row.cells[i].querySelector("input").checked);
    }
    habitsArray.push({name, days});
  });
  localStorage.setItem("habits", JSON.stringify(habitsArray));
}

function loadHabits(){
  tableBody.innerHTML="";
  const saved = JSON.parse(localStorage.getItem("habits")) || [];
  saved.forEach(habit=>{
    const row = createHabitRow(habit.name, habit.days);
    tableBody.appendChild(row);
  });
}

function addHabit(){
  const input = document.getElementById("habitInput");
  if(input.value.trim()==="") return;
  const row = createHabitRow(input.value);
  tableBody.appendChild(row);
  input.value="";
  saveHabits();
  showNotification("✅ عادة جديدة أضيفت");
}

function updateTop(){
  const list = document.getElementById("topList");
  list.innerHTML="";
  const li = document.createElement("li");
  li.textContent="🥇 "+player+" - "+bestScore+" نقطة";
  list.appendChild(li);
}

function loadData(){
  loadHabits();
  calculatePointsFromHabits();
  updateStats();
}

loadData();
</script>

</body>
</html>
