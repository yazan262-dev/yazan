<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ملتقى شباب التميز إربد</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;font-family:'Cairo',sans-serif;transition:all 0.2s}
body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(-45deg,#0d47a1,#1976d2,#42a5f5,#90caf9);
  background-size:400% 400%;
  animation:gradientMove 15s ease infinite;
  display:flex;
  justify-content:center;
  padding:15px;
}
@keyframes gradientMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
.container{
  width:100%;
  max-width:1100px;
  background:white;
  border-radius:25px;
  padding:25px;
  box-shadow:0 20px 50px rgba(0,0,0,0.2);
}
.header{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:15px;
  margin-bottom:15px;
}
.logo{
  width:70px;
  height:70px;
  object-fit:contain;
  animation:logoFloat 3s ease-in-out infinite;
}
@keyframes logoFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}
h1{color:#0d47a1;margin:0;font-size:26px;}
.stats{text-align:center;margin-bottom:20px}
.points{font-size:22px;font-weight:bold}
.progress{
  height:18px;
  background:#e3f2fd;
  border-radius:20px;
  overflow:hidden;
  margin:10px 0;
}
.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#0d47a1,#1976d2,#42a5f5);
}
button{
  padding:6px 10px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  background:linear-gradient(45deg,#0d47a1,#1976d2);
  color:white;
  transition:0.3s;
  font-size:13px;
}
button:hover{transform:scale(1.05);}
.reset-btn{margin-top:10px;background:linear-gradient(45deg,#1565c0,#42a5f5);}
.reset-btn:active{transform:scale(0.9);}
.input-section{display:flex;gap:6px;margin-bottom:15px;flex-wrap:wrap;align-items:center;}
.input-section input{
  padding:6px;
  border-radius:12px;
  border:1px solid #1976d2;
  background:#e1f5fe;
  color:#0d47a1;
  flex:1 1 auto;
  min-width:80px;
  max-width:200px;
  font-size:13px;
}
.table-container{overflow-x:auto;}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
  min-width:440px;
}
th,td{
  padding:3px;
  text-align:center;
  font-size:11px;
}
th{background:#0d47a1;color:white}
tr:hover{background:#e3f2fd}
input[type="checkbox"]{width:16px;height:16px;accent-color:#0d47a1}
.delete-btn{
  background:#1976d2;
  color:white;
  border:none;
  padding:3px 6px;
  border-radius:6px;
  cursor:pointer;
  font-size:10px;
}
.delete-btn:hover{background:#42a5f5;}
.top-board{
  margin-top:15px;
  background:#e3f2fd;
  padding:8px 12px;
  border-radius:12px;
}
.top-board ul{list-style:none;padding:0;margin:0;font-size:13px;}
.notification{
  position:fixed;
  top:15px;
  right:15px;
  background:#ff3d00;
  color:white;
  padding:10px 14px;
  border-radius:10px;
  opacity:0;
  transform:scale(0.5);
  z-index:1000;
}
.notification.show{
  animation:pop 0.6s forwards;
}
@keyframes pop{
  0%{opacity:0;transform:scale(0.5)}
  60%{opacity:1;transform:scale(1.2)}
  100%{opacity:1;transform:scale(1)}
}
@media(max-width:768px){
  .header h1{font-size:22px;}
  .logo{width:50px;height:50px;}
  .input-section input{max-width:150px;}
  table, th, td{font-size:10px; padding:2px;}
  .delete-btn{padding:2px 4px; font-size:9px;}
}
@media(max-width:480px){
  .header h1{font-size:20px;}
  .logo{width:45px;height:45px;}
  .input-section input{max-width:120px;}
  table, th, td{font-size:11px; padding:2px;}
  .delete-btn{padding:2px 4px; font-size:10px;}
  table{min-width:460px;}
}
/* لعبة الحية */
.game-section{margin-top:40px;text-align:center;}
.game-box{position:relative;display:flex;justify-content:center;}
canvas{background:#0d47a1;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,0.3);max-width:100%;}
.score{position:absolute;top:10px;left:10px;background:rgba(0,0,0,0.6);color:white;padding:5px 12px;border-radius:10px;font-weight:bold;}
/* تعديل المسافة بين اللعبة وأزرار التحكم */
.game-buttons{
  margin-top:25px;
  display:flex;
  justify-content:center;
  gap:15px;
}
/* تصحيح اتجاه أزرار الأسهم بسبب RTL */
.controls{
  margin-top:20px;
  display:grid;
  grid-template-columns:60px 60px 60px;
  justify-content:center;
  gap:12px;
  direction:ltr; /* مهم: يجعل أزرار الأسهم تعمل بشكل صحيح */
}
.controls button{font-size:22px;padding:10px;}
</style>
</head>
<body>
<div class="container">

<div class="header">
  <img src="https://i.imgur.com/UUCXAqE.png" alt="شعار ملتقى شباب التميز" class="logo">
  <h1>ملتقى شباب التميز إربد</h1>
</div>

<div class="input-section">
  <span id="displayName" style="font-weight:bold;font-size:14px;">
    اسمك: <span id="currentName">ضيف هنا</span>
  </span>
  <input type="text" id="nameInput" placeholder="غيّر اسمك...">
  <button onclick="changeName()">تغيير الاسم</button>
</div>

<div class="stats">
  <div class="points" id="points">النقاط: 0</div>
  <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
  <div id="level">المستوى: مبتدئ</div>
  <button class="reset-btn" onclick="resetPoints()">🔄 تصفير النقاط</button>
</div>

<div class="input-section">
  <input type="text" id="habitInput" placeholder="أضف عادة جديدة...">
  <button onclick="addHabit()">إضافة</button>
</div>

<div class="table-container">
<table id="habitTable">
<thead>
<tr>
<th>العادة</th>
<th>الأحد</th><th>الإثنين</th><th>الثلاثاء</th>
<th>الأربعاء</th><th>الخميس</th><th>الجمعة</th><th>السبت</th>
<th>حذف</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="top-board">
<h3>🏆 أعلى نتيجة</h3>
<ul id="topList"></ul>
</div>

<div id="notification" class="notification"></div>

<!-- لعبة الحية -->
<div class="game-section">
<h2>🐍 لعبة الحية</h2>
<div class="game-box">
<div class="score">Score: <span id="score">0</span></div>
<canvas id="game" width="320" height="320"></canvas>
</div>
<div class="game-buttons">
<button onclick="startGame()">▶️ بدء اللعبة</button>
<button onclick="pauseGame()">⏸ إيقاف مؤقت</button>
</div>
<div class="controls">
<div></div>
<button onclick="changeDirection('up')">⬆️</button>
<div></div>
<button onclick="changeDirection('left')">⬅️</button>
<button onclick="changeDirection('down')">⬇️</button>
<button onclick="changeDirection('right')">➡️</button>
</div>
</div>

</div>

<script>
/* ---- نظام العادات والاسم والنقاط ---- */
let points=0;
let bestScore=parseInt(localStorage.getItem("bestScore"))||0;
const tableBody=document.querySelector("#habitTable tbody");
function showNotification(msg){
  const notif=document.getElementById("notification");
  notif.textContent=msg;
  notif.classList.remove("show");
  void notif.offsetWidth;
  notif.classList.add("show");
  setTimeout(()=>notif.classList.remove("show"),2000);
}
function saveHabits(){
  const habits=[];
  tableBody.querySelectorAll("tr").forEach(row=>{
    const name=row.cells[0].textContent;
    const days=[];
    for(let i=1;i<=7;i++){days.push(row.cells[i].querySelector("input").checked);}
    habits.push({name,days});
  });
  localStorage.setItem("habits",JSON.stringify(habits));
}
function loadHabits(){
  const habits=JSON.parse(localStorage.getItem("habits"))||[];
  tableBody.innerHTML="";
  habits.forEach(h=>tableBody.appendChild(createHabitRow(h.name,h.days)));
  calculatePoints();
}
function createHabitRow(name,days=[]){
  const row=document.createElement("tr");
  row.innerHTML=`<td>${name}</td>`;
  for(let i=0;i<7;i++){
    const td=document.createElement("td");
    const cb=document.createElement("input");
    cb.type="checkbox";
    cb.checked=days[i]||false;
    cb.addEventListener("change",()=>{calculatePoints();saveHabits();});
    td.appendChild(cb);
    row.appendChild(td);
  }
  const del=document.createElement("td");
  del.innerHTML="<button class='delete-btn'>X</button>";
  del.addEventListener("click",()=>{
    row.remove();calculatePoints();saveHabits();showNotification("🗑 تم حذف عادة");
  });
  row.appendChild(del);
  return row;
}
function addHabit(){
  const input=document.getElementById("habitInput");
  if(!input.value.trim()) return;
  const row=createHabitRow(input.value);
  tableBody.appendChild(row);
  input.value="";
  saveHabits();
  calculatePoints();
  showNotification("✅ عادة جديدة أضيفت");
}
function calculatePoints(){
  points=0;
  tableBody.querySelectorAll("tr").forEach(row=>{
    for(let i=1;i<=7;i++){
      if(row.cells[i].querySelector("input").checked) points+=10;
    }
  });
  updateStats();
}
function updateStats(){
  document.getElementById("points").textContent="النقاط: "+points;
  document.getElementById("progressBar").style.width=(points%100)+"%";
  let level="مبتدئ";
  if(points>=200) level="أسطورة 👑";
  else if(points>=100) level="متقدم 🔥";
  document.getElementById("level").textContent="المستوى: "+level;
  if(points>bestScore){
    bestScore=points;
    localStorage.setItem("bestScore",bestScore);
    showNotification("🏆 رقم قياسي جديد!");
  }
  updateTopList();
}
function updateTopList(){
  const list=document.getElementById("topList");
  list.innerHTML=`<li>🥇 النقاط الحالية: ${points} نقطة</li>`;
}
function resetPoints(){
  document.querySelectorAll("input[type='checkbox']").forEach(cb=>cb.checked=false);
  points=0;
  updateStats();
  saveHabits();
  showNotification("🔄 تم تصفير النقاط");
}
function changeName(){
  const input=document.getElementById("nameInput");
  const newName=input.value.trim();
  if(!newName) return;
  const nameDisplay=document.getElementById("currentName");
  nameDisplay.style.transition="all 0.5s";
  nameDisplay.style.transform="scale(1.3)";
  nameDisplay.style.color="#ff5722";
  setTimeout(()=>{
    nameDisplay.textContent=newName;
    nameDisplay.style.transform="scale(1)";
    nameDisplay.style.color="#0d47a1";
  },300);
  localStorage.setItem("userName", newName);
  input.value="";
  showNotification("✨ تم تغيير الاسم بنجاح!");
}
window.addEventListener("DOMContentLoaded",()=>{
  const savedName=localStorage.getItem("userName");
  if(savedName) document.getElementById("currentName").textContent=savedName;
  loadHabits();
});

/* ---- لعبة الحية ---- */
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const grid=16;
let snake=[{x:160,y:160}];
let dx=grid;
let dy=0;
let apple={x:80,y:80};
let score=0;
let running=false;
let paused=false;
let gameSpeed=160;
let lastMove=0;

function random(){return Math.floor(Math.random()*20)*grid;}
function startGame(){running=true;paused=false;}
function pauseGame(){paused=!paused;}
function resetGame(){snake=[{x:160,y:160}];dx=grid;dy=0;score=0;document.getElementById("score").innerText=score;}
function gameOver(){showNotification("💥 خسرت اللعبة!");running=false;resetGame();}

function loop(time){
  requestAnimationFrame(loop);
  if(!running || paused) return;
  if(time-lastMove<gameSpeed) return;
  lastMove=time;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  let head={x:snake[0].x+dx,y:snake[0].y+dy};
  if(head.x<0||head.y<0||head.x>=canvas.width||head.y>=canvas.height){gameOver();return;}
  snake.unshift(head);
  if(head.x==apple.x&&head.y==apple.y){score++;document.getElementById("score").innerText=score;apple.x=random();apple.y=random();}
  else{snake.pop();}
  ctx.fillStyle="red";ctx.fillRect(apple.x,apple.y,grid-1,grid-1);
  ctx.fillStyle="lime";snake.forEach(s=>{ctx.fillRect(s.x,s.y,grid-1,grid-1);});
  for(let i=1;i<snake.length;i++){if(head.x==snake[i].x && head.y==snake[i].y){gameOver();}}
}

function changeDirection(dir){
  if(dir=="left"&&dx==0){dx=-grid;dy=0;}
  if(dir=="right"&&dx==0){dx=grid;dy=0;}
  if(dir=="up"&&dy==0){dy=-grid;dx=0;}
  if(dir=="down"&&dy==0){dy=grid;dx=0;}
}
document.addEventListener("keydown",e=>{
  if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) e.preventDefault();
  if(e.key=="ArrowLeft") changeDirection("left");
  if(e.key=="ArrowRight") changeDirection("right");
  if(e.key=="ArrowUp") changeDirection("up");
  if(e.key=="ArrowDown") changeDirection("down");
});
requestAnimationFrame(loop);
</script>
</body>
</html>
